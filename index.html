<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our 3 Years in NCC | Jai Hind</title>

    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,900&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #4B5320;
            --accent-glow: rgba(75, 83, 32, 0.6);
            --gold: #d4af37;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --bg-dark: #050505;
            --royal-red: #1a1c12;
            --bulb-warm: #fff;
            --bulb-glow: rgba(255, 255, 255, 0.8);
        }

        html, body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            color: white;
            perspective: 1000px;
        }

        .ncc-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
            background-color: var(--bg-dark);
        }

        .ncc-background img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.15;
            filter: blur(5px) grayscale(100%) sepia(100%) hue-rotate(60deg) saturate(150%);
            animation: bgZoomOut 20s linear infinite alternate;
        }

        @keyframes bgZoomOut {
            from { transform: scale(1.1); }
            to { transform: scale(1); }
        }

        .ncc-background::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1), rgba(0,0,0,0.1) 1px, transparent 1px, transparent 2px);
            opacity: 0.3;
        }

        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            visibility: hidden;
            opacity: 0;
            transform: scale(1.1);
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
        }

        .page.active {
            visibility: visible;
            opacity: 1;
            transform: scale(1);
            z-index: 10;
        }

        @keyframes floatEffect {
            0% { transform: translateY(0) scale(0); opacity: 0; }
            20% { opacity: 0.8; }
            100% { transform: translateY(-110vh) scale(1.2) rotate(360deg); opacity: 0; }
        }

        @keyframes neonPulse {
            0%, 100% { box-shadow: 0 0 10px var(--accent); }
            50% { box-shadow: 0 0 30px var(--accent); }
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.2rem, 8vw, 5rem);
            font-weight: 900;
            background: linear-gradient(to right, #fff, var(--gold), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
            margin-bottom: 0.5rem;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .hero-sub {
            font-size: 1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 3rem;
        }

        .btn-neon {
            padding: 18px 45px;
            font-size: 1rem;
            color: white;
            background: transparent;
            border: 1px solid var(--gold);
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: neonPulse 2s infinite;
        }

        .slider-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 50px 30px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            max-width: 500px;
            width: 95%;
        }

        .step-content {
            display: none;
            min-height: 150px;
            flex-direction: column;
            justify-content: center;
        }

        .step-content.active {
            display: flex;
        }

        .curtain-panel {
            position: absolute;
            top: 0;
            width: 51%;
            height: 100%;
            background: repeating-linear-gradient(to right, #1a1c12, #2a2e1c 10%);
            z-index: 20;
            transition: transform 2.5s cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        .curtain-left { left: 0; }
        .curtain-right { right: 0; }

        .open .curtain-left { transform: translateX(-100%); }
        .open .curtain-right { transform: translateX(100%); }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .memory-card {
            position: relative;
            height: 350px;
            border-radius: 20px;
            overflow: hidden;
        }

        .memory-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>

<body>

<div class="ncc-background">
    <img src="./assets/images/konstantin-v-march.jpg">
</div>

<div id="particle-container" style="position:fixed;width:100%;height:100%;top:0;left:0;pointer-events:none;z-index:0;"></div>

<section id="hero-page" class="page active">
    <h1 class="hero-title">Our 3 Years in NCC</h1>
    <p class="hero-sub">Discipline. Unity. Memories That Will Last Forever.</p>
    <button class="btn-neon" onclick="transitionTo('message-slider-page')">Begin the Journey</button>
</section>

<section id="message-slider-page" class="page">
    <div class="slider-card">
        <div id="step-1" class="step-content active">
            <h2>Hard to say Goodbye...</h2>
            <button class="btn-neon" onclick="nextStep(2)">Next</button>
        </div>
        <div id="step-2" class="step-content">
            <p>The final chapter… filled with pride and memories.</p>
            <button class="btn-neon" onclick="nextStep(3)">Next</button>
        </div>
        <div id="step-3" class="step-content">
            <h2>Ready to see our memories?</h2>
            <button class="btn-neon" onclick="finishSlider()">Open Memories</button>
        </div>
    </div>
</section>

<section id="curtain-page" class="page">
    <div id="stage" style="position:relative;width:100%;height:100%;">
        <div class="curtain-panel curtain-left"></div>
        <div class="curtain-panel curtain-right"></div>
        <button onclick="transitionTo('gallery-page')" class="btn-neon">Gallery</button>
    </div>
</section>

<section id="gallery-page" class="page">
    <div class="gallery-grid">
        <div class="memory-card"><img loading="lazy" src="./assets/images/j9.jpg"></div>
        <div class="memory-card"><img loading="lazy" src="./assets/images/ritika.jpeg"></div>
        <div class="memory-card"><img loading="lazy" src="./assets/images/g3.jpg"></div>
    </div>
</section>

<audio id="bg-audio" loop>
    <source src="./assets/audio/memories.mp3">
</audio>

<script>
let particleCount = 0;
const MAX_PARTICLES = 40;

function transitionTo(id){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    const el = document.getElementById(id);
    if(el) el.classList.add('active');

    if(id === 'curtain-page'){
        setTimeout(()=>{
            const stage = document.getElementById('stage');
            if(stage) stage.classList.add('open');
        },1000);
    }
}

function nextStep(n){
    document.querySelectorAll('.step-content').forEach(s=>s.classList.remove('active'));
    const el = document.getElementById('step-'+n);
    if(el) el.classList.add('active');
}

function finishSlider(){
    transitionTo('curtain-page');
}

function createParticle(){
    if(particleCount >= MAX_PARTICLES) return;

    const container = document.getElementById('particle-container');
    if(!container) return;

    particleCount++;

    const p = document.createElement('div');
    p.style.position='absolute';
    p.style.left=Math.random()*100+'vw';
    p.style.bottom='-5vh';
    p.innerHTML='🇮🇳';
    p.style.fontSize='20px';
    p.style.opacity=Math.random()*0.5+0.2;
    p.style.animation=`floatEffect ${Math.random()*3+3}s linear forwards`;

    container.appendChild(p);

    setTimeout(()=>{
        p.remove();
        particleCount--;
    },7000);
}

setInterval(createParticle,500);
</script>

</body>
</html>
